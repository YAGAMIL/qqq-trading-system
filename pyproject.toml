[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
no_strict_optional = false

[tool.coverage.run]
branch = true
source = ["."]
omit = ["tests/*", "graphify-out/*"]

[tool.coverage.report]
skip_empty = true
show_missing = true
